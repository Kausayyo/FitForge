window.generateExerciseVideo=async(exerciseName)=>{
  if(State.generatingVideoFor)return showToast('Already generating a video…','error');
  if(!State.currentUser?.isPremium)return goto('premium');
  State.generatingVideoFor=exerciseName;render();
  showToast(`Generating AI demo for ${exerciseName}…`);
  const talent=State.currentUser?.gender==='female'?'A muscular, athletic woman with her hair tied back':'A muscular, athletic man';
  const prompt=`${talent} demonstrating perfect ${exerciseName} form using the correct gym equipment for this exact exercise, slow motion, professional gym studio, cinematic lighting, clear technique tutorial`;
  let videoUrl=null;

  // 1. Backend proxy (recommended — API key lives on server)
  if(getJwt()){
    const r=await apiCall('POST','/ai/exercise-video',{exerciseName,prompt});
    if(r?.videoUrl)videoUrl=r.videoUrl;
  }

  // 2. Direct Higgsfield call (if user set their own KEY_ID:KEY_SECRET)
  if(!videoUrl){
    const key=getHiggsKey();
    if(key){
      try{videoUrl=await callHiggsVideo(prompt,key);}
      catch(e){console.warn('Direct Higgsfield failed:',e.message);}
    }
  }

  if(videoUrl){
    setExerciseVideo(exerciseName,videoUrl);
    showToast(`✓ AI video ready for ${exerciseName}`,'success');
  }else{
    showToast('Video unavailable. Sign in or add a Higgsfield key in Profile.','error');
  }
  State.generatingVideoFor=null;render();
};

async function callHiggsVideo(prompt,apiKey){
  // POST text-to-video job
  const res=await fetch('https://platform.higgsfield.ai/v1/generations',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Key ${apiKey}`},
    body:JSON.stringify({task:'text-to-video',prompt,duration:5,aspect_ratio:'16:9'})
  });
  if(!res.ok)throw new Error(`Higgsfield ${res.status}`);
  const data=await res.json();
  const requestId=data.request_id||data.generation_id||data.id;
  if(!requestId)throw new Error('No request ID from Higgsfield');

  // Poll status (2 s interval, up to 3 min)
  for(let i=0;i<90;i++){
    await new Promise(r=>setTimeout(r,2000));
    const sr=await fetch(`https://platform.higgsfield.ai/requests/${requestId}/status`,{
      headers:{'Authorization':`Key ${apiKey}`}
    });
    if(!sr.ok)continue;
    const sd=await sr.json();
    const st=sd.status||sd.state;
    if(st==='completed'||st==='success'){
      return sd.url||sd.video_url||sd.results?.raw?.url||sd.jobs?.[0]?.results?.raw?.url||null;
    }
    if(st==='failed'||st==='nsfw')throw new Error('Higgsfield generation failed');
  }
  throw new Error('Higgsfield timed out');
}

function formatTime(ms){

  const weightKg=State.currentUser.weight||70;
  (s.exercises||[]).forEach(ex=>{
    const sets=(ex.sets||[]).filter(st=>st.done).length||(ex.sets||[]).length||1;
    apiCall('POST','/workouts/log',{exerciseName:ex.name,sets,durationMin,caloriesBurned:Math.round(durationMin*weightKg*0.08)});
  });
  // Streak calculation
  const todayStr=new Date().toISOString().split('T')[0];
  const lastD=State.currentUser.lastWorkoutDate;
  if(lastD){
    const diff=Math.floor((new Date(todayStr)-new Date(lastD))/86400000);
    if(diff===0){/*same day, keep streak*/}
    else if(diff===1)State.currentUser.streak=(State.currentUser.streak||0)+1;
    else State.currentUser.streak=1;
  }else{State.currentUser.streak=1;}
  State.currentUser.lastWorkoutDate=todayStr;
  State.streak=State.currentUser.streak;
  State.lastWorkoutDate=todayStr;
  await saveData('user_'+State.currentUser.email,State.currentUser);

};

  // Strip data-URL prefix → raw base64 for backend
  const rawImages=images.map(img=>{const c=img.indexOf(',');return c>=0?img.slice(c+1):img;});

  // Demo mode fallback if backend unreachable
  if(!done){
    State.scanResults=GYM_SCAN_DEMO;markScanned();
    showToast('Using demo scan — check your internet connection','error');

  const email=await loadData('currentUserEmail');
  if(email){
    const p=await loadData('user_'+email);
    if(p){
      State.currentUser=p;State.currentPage=p.onboarded?'home':'onboarding';
      State.streak=p.streak||0;State.lastWorkoutDate=p.lastWorkoutDate||null;
      const todayStr=new Date().toISOString().split('T')[0];
      if(p.waterDate===todayStr){State.waterToday=p.waterToday||0;State.waterDate=todayStr;}
      else{State.waterToday=0;State.waterDate=todayStr;}
    }
    // Background refresh from backend — merge server fields, preserve local-only data
    if(getJwt()){
      apiCall('GET','/users/me').then(r=>{
        if(r?.user){
          const s=r.user;
          const cur=State.currentUser||{};
          State.currentUser={...cur,name:s.name,isPremium:s.isPremium||false,weight:s.weight||cur.weight,height:s.height||cur.height,age:s.age||cur.age,city:s.city||cur.city,_id:s._id||s.id};
          saveData('user_'+(s.email||email),State.currentUser);
        }
      }).catch(()=>{});
      // Premium status can change/expire server-side — keep it in sync.
      apiCall('GET','/payments/status').then(r=>{
        if(r&&State.currentUser){
          State.currentUser.isPremium=r.isPremium;
          State.currentUser.premiumExpiresAt=r.premiumExpiresAt;
          saveData('user_'+State.currentUser.email,State.currentUser);
          if(['home','profile','premium'].includes(State.currentPage))render();
        }
      }).catch(()=>{});
      // Workout stats for the Home dashboard widget.
      apiCall('GET','/workouts/stats').then(r=>{
        if(r?.stats){
          State.workoutStats=r.stats;
          if(State.currentPage==='home')render();
        }
      }).catch(()=>{});
      // Partner cycle sharing — refresh link/invite status and any shared prediction.
      apiCall('GET','/partner').then(r=>{
        if(r){State.partnerData=r;if(['home','profile','partner'].includes(State.currentPage))render();}
      }).catch(()=>{});
      apiCall('GET','/partner/cycle-status').then(r=>{
        if(r){State.partnerCycleStatus=r;if(['home','partner'].includes(State.currentPage))render();}
      }).catch(()=>{});
      syncCycleToPartner();
    }
  }
  render();
  if(getWorkoutXKey())fetchExerciseGifs();
  if(CapSplashScreen)setTimeout(()=>CapSplashScreen.hide().catch(()=>{}),300);
}

init();

// ---- PWA: service worker registration + "Install App" prompt ----
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('fitforge-sw.js').catch(()=>{});
  });
}
let deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredInstallPrompt=e;
  if(State.currentPage==='profile')render();
});
window.addEventListener('appinstalled',()=>{
  deferredInstallPrompt=null;
  if(State.currentPage==='profile')render();
});
async function installPwa(){
  if(!deferredInstallPrompt)return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt=null;
  render();
}
