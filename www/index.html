<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitForge">
<link rel="manifest" href="fitforge.webmanifest">
<link rel="apple-touch-icon" href="fitforge-icons/apple-touch-icon-180.png">
<link rel="icon" href="fitforge-icons/icon-192.png">
<title>FitForge · Forge Your Fittest Self</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  :root {
    --bg:#0c0c0f;--surface:#13131a;--card:#18181f;--card2:#1d1d27;
    --border:#2a2a38;--border2:#353548;--text:#e8e8f0;--muted:#6a6a7a;--muted2:#8a8a9a;
    --push:#e85c3a;--pull:#f5a623;--legs:#4ecdc4;--full:#a78bfa;
    --yoga:#a78bfa;--home:#4ecdc4;--pranayama:#f5a623;--calisthenics:#e85c3a;
    --green:#34d399;--gold:#fbbf24;--red:#ef4444;--razorpay:#3395ff;
    --cycle-men:#ef4444;--cycle-fol:#34d399;--cycle-ov:#f5a623;--cycle-lut:#a78bfa;
    --cycle-pink:#f472b6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
  body{padding-bottom:80px}
  body.no-nav{padding-bottom:0}
  .display{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:-0.5px;line-height:0.92}
  .mono{font-family:'JetBrains Mono',monospace}
  .btn{border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:16px 28px;border-radius:10px;font-size:15px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary{background:var(--push);color:white}.btn-primary:hover{background:#d4502e}
  .btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--text)}
  .btn-gold{background:var(--gold);color:#1a1a00}.btn-gold:hover{background:#f5b104}
  .btn-pink{background:var(--cycle-pink);color:white}
  .btn-full{width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:10px;font-family:'Barlow',sans-serif;font-size:15px;transition:border-color .15s}
  .input:focus{outline:none;border-color:var(--push)}
  .input::placeholder{color:var(--muted)}
  .label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
  .page{min-height:100vh;padding:24px;max-width:480px;margin:0 auto}
  /* AUTH */
  .auth-page{min-height:100vh;padding:60px 24px;display:flex;flex-direction:column}
  .auth-back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0;margin-bottom:24px;display:flex;align-items:center;gap:6px}
  .auth-title{font-size:44px;margin-bottom:8px}
  .auth-sub{color:var(--muted2);font-size:14px;margin-bottom:36px}
  .form-group{margin-bottom:18px}
  .form-error{color:var(--red);font-size:12px;margin-top:6px;font-family:'JetBrains Mono',monospace}
  .auth-link{text-align:center;margin-top:24px;color:var(--muted);font-size:14px}
  .auth-link a{color:var(--push);cursor:pointer;font-weight:600}
  /* LANDING */
  .landing-hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:40px 24px;background:radial-gradient(ellipse at top,rgba(232,92,58,.08),transparent 60%);position:relative;overflow:hidden}
  .landing-hero::before{content:'CUT';position:absolute;right:-30px;top:50%;transform:translateY(-50%);font-family:'Barlow Condensed',sans-serif;font-size:280px;font-weight:900;color:rgba(255,255,255,.025);pointer-events:none;line-height:1}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--push);text-transform:uppercase;margin-bottom:18px}
  .landing-title{font-size:clamp(56px,14vw,88px);margin-bottom:16px}
  .landing-title .accent{color:var(--push)}
  .landing-sub{font-size:15px;color:var(--muted2);line-height:1.65;max-width:380px;margin-bottom:32px}
  .landing-features{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:32px}
  .feature-mini{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center}
  .feature-mini .icon{height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
  .feature-mini .icon svg{width:18px;height:18px;stroke:var(--push);fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  .feature-mini .name{font-size:11px;font-weight:600;color:var(--text)}
  .landing-actions{display:flex;flex-direction:column;gap:10px}
  /* ONBOARDING */
  .onboard-progress{display:flex;gap:6px;margin-bottom:32px}
  .onboard-step-bar{flex:1;height:3px;background:var(--border);border-radius:99px}
  .onboard-step-bar.active{background:var(--push)}
  .onboard-step-bar.pink{background:var(--cycle-pink)}
  .onboard-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--push);letter-spacing:2px;margin-bottom:10px}
  .onboard-q{font-size:32px;margin-bottom:12px}
  .onboard-hint{color:var(--muted2);font-size:13px;margin-bottom:28px;line-height:1.6}
  .choice-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;margin-bottom:12px;display:flex;align-items:center;gap:14px}
  .choice-card.selected{border-color:var(--push);background:rgba(232,92,58,.06)}
  .choice-card.pink-sel.selected{border-color:var(--cycle-pink);background:rgba(244,114,182,.06)}
  .choice-card .emoji{font-size:28px}
  .choice-badge{min-width:44px;height:44px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--push);letter-spacing:1px;flex-shrink:0}
  .app-logo{height:36px;width:auto;object-fit:contain}
  .app-logo-lg{height:56px;width:auto;object-fit:contain}
  .logo-lockup{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .logo-lockup .mark svg{display:block}
  .logo-lockup .wordmark{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.5px}
  .logo-lockup .wordmark .forge{color:#FF8A1E}
  .logo-lockup-sm{display:flex;align-items:center;gap:8px;margin-bottom:24px}
  .logo-lockup-sm .wordmark{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.5px;font-size:22px}
  .logo-lockup-sm .wordmark .forge{color:#FF8A1E}
  .choice-card .info .ttl{font-weight:700;font-size:15px}
  .choice-card .info .desc{font-size:12px;color:var(--muted);margin-top:2px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:99px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;user-select:none}
  .chip.selected{background:var(--push);border-color:var(--push);color:white}
  .onboard-nav{display:flex;gap:10px;margin-top:32px}
  .onboard-nav .btn{flex:1}
  /* HOME */
  .home-greet{margin-bottom:20px}
  .home-greet .hi{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800}
  .home-greet .day{font-size:12px;color:var(--muted2);margin-top:2px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px;background:var(--push);border-radius:14px;padding:4px}
  .stat-cell{text-align:center;padding:14px 8px;border-radius:10px}
  .stat-cell .v{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:white;line-height:1}
  .stat-cell .l{font-size:9px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.7);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
  .today-card{background:var(--card);border-radius:14px;padding:20px;margin-bottom:16px;border-top:3px solid var(--push);cursor:pointer;transition:all .15s}
  .today-card:hover{background:var(--card2)}
  .today-card.push{border-top-color:var(--push)}.today-card.pull{border-top-color:var(--pull)}.today-card.legs{border-top-color:var(--legs)}.today-card.full{border-top-color:var(--full)}.today-card.rest{border-top-color:var(--muted)}
  .today-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  .today-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase}
  .today-meta{font-size:12px;color:var(--muted2);margin-top:8px;display:flex;gap:14px}
  .today-meta span::before{content:'•';margin-right:6px;color:var(--push)}
  .progress-block{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px}
  .progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .progress-name{font-size:13px;font-weight:600}
  .progress-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--push)}
  .progress-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:var(--push);border-radius:99px;transition:width .4s ease}
  .progress-fill.green{background:var(--green)}
  .progress-fill.pink{background:var(--cycle-pink)}
  .week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
  .week-cell{background:var(--card);border-radius:8px;padding:12px 4px;text-align:center;border-top:2px solid var(--border)}
  .week-cell.push{border-top-color:var(--push)}.week-cell.pull{border-top-color:var(--pull)}.week-cell.legs{border-top-color:var(--legs)}.week-cell.full{border-top-color:var(--full)}.week-cell.today{background:var(--card2)}
  .week-cell .d{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:4px}
  .week-cell .t{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase}
  .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .quick-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.5px;text-align:left}
  .quick-btn:hover{border-color:var(--push)}
  .quick-btn .ico{height:20px;display:flex;align-items:center;margin-bottom:6px}
  .quick-btn .ico svg{width:16px;height:16px;stroke:var(--push);fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  /* TABS */
  .page-title{font-size:36px;margin-bottom:4px}
  .page-sub{color:var(--muted2);font-size:13px;margin-bottom:24px}
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{background:none;border:none;color:var(--muted);padding:14px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.active.push{color:var(--push);border-bottom-color:var(--push)}
  .tab.active.pull{color:var(--pull);border-bottom-color:var(--pull)}
  .tab.active.legs{color:var(--legs);border-bottom-color:var(--legs)}
  .tab.active.full{color:var(--full);border-bottom-color:var(--full)}
  .tab.active.yoga{color:var(--yoga);border-bottom-color:var(--yoga)}
  .tab.active.home{color:var(--home);border-bottom-color:var(--home)}
  .tab.active.pranayama{color:var(--pranayama);border-bottom-color:var(--pranayama)}
  .tab.active.calisthenics{color:var(--calisthenics);border-bottom-color:var(--calisthenics)}
  .tab.active.mallakhamba{color:var(--gold);border-bottom-color:var(--gold)}
  /* EXERCISE CARDS */
  .ex-card{background:var(--card);border-radius:14px;margin-bottom:14px;overflow:hidden;border-top:3px solid var(--push);position:relative}
  .ex-card.push{border-top-color:var(--push)}.ex-card.pull{border-top-color:var(--pull)}.ex-card.legs{border-top-color:var(--legs)}.ex-card.full{border-top-color:var(--full)}.ex-card.yoga{border-top-color:var(--yoga)}.ex-card.home{border-top-color:var(--home)}.ex-card.pranayama{border-top-color:var(--pranayama)}.ex-card.calisthenics{border-top-color:var(--calisthenics)}.ex-card.mallakhamba{border-top-color:var(--gold)}
  .ex-visual{height:160px;position:relative;overflow:hidden;background:var(--card2);display:flex;align-items:center;justify-content:center}
  .ex-visual svg{width:100%;height:100%}
  .lock-overlay{position:absolute;inset:0;background:rgba(13,13,18,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:2;cursor:pointer}
  .lock-icon{font-size:32px;color:var(--gold);margin-bottom:6px}
  .lock-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
  .premium-badge{position:absolute;top:8px;right:8px;background:var(--gold);color:#1a1a00;padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;border-radius:4px;z-index:3}
  .ex-info{padding:14px 16px 16px}
  .ex-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:4px}
  .ex-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .ex-sets{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--push);margin-bottom:10px;font-weight:500}
  .ex-card.pull .ex-sets{color:var(--pull)}.ex-card.legs .ex-sets{color:var(--legs)}.ex-card.full .ex-sets{color:var(--full)}.ex-card.yoga .ex-sets{color:var(--yoga)}.ex-card.home .ex-sets{color:var(--home)}.ex-card.pranayama .ex-sets{color:var(--pranayama)}.ex-card.calisthenics .ex-sets{color:var(--calisthenics)}.ex-card.mallakhamba .ex-sets{color:var(--gold)}
  .ex-tip{font-size:12px;color:var(--muted2);line-height:1.55;border-left:2px solid var(--border);padding-left:10px;margin-bottom:10px}
  .ex-muscles{display:flex;flex-wrap:wrap;gap:5px}
  .muscle-pill{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;background:rgba(232,92,58,.1);color:var(--push)}
  .muscle-pill.sec{background:rgba(255,255,255,.05);color:var(--muted)}
  .ex-card.pull .muscle-pill:not(.sec){background:rgba(245,166,35,.1);color:var(--pull)}
  .ex-card.legs .muscle-pill:not(.sec){background:rgba(78,205,196,.1);color:var(--legs)}
  .ex-card.full .muscle-pill:not(.sec){background:rgba(167,139,250,.1);color:var(--full)}
  .ex-card.yoga .muscle-pill:not(.sec){background:rgba(167,139,250,.1);color:var(--yoga)}
  .ex-card.home .muscle-pill:not(.sec){background:rgba(78,205,196,.1);color:var(--home)}
  .ex-card.pranayama .muscle-pill:not(.sec){background:rgba(245,166,35,.1);color:var(--pranayama)}
  .ex-card.calisthenics .muscle-pill:not(.sec){background:rgba(232,92,58,.1);color:var(--calisthenics)}
  .ex-card.mallakhamba .muscle-pill:not(.sec){background:rgba(251,191,36,.1);color:var(--gold)}
  /* DIET */
  .macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
  .macro-cell{background:var(--card);border-radius:12px;padding:16px 10px;text-align:center;border-top:3px solid var(--border)}
  .macro-cell.p{border-top-color:var(--push)}.macro-cell.c{border-top-color:#5c8df6}.macro-cell.f{border-top-color:var(--red)}
  .macro-cell .v{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:1}
  .macro-cell.p .v{color:var(--push)}.macro-cell.c .v{color:#5c8df6}.macro-cell.f .v{color:var(--red)}
  .macro-cell .l{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:1.5px;margin-top:4px;text-transform:uppercase}
  .meal-card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
  .meal-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--push);letter-spacing:1.5px;margin-bottom:4px}
  .meal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .meal-tag{font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--card2);color:var(--muted);padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
  .meal-foods{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px}
  .meal-bottom{display:flex;justify-content:space-between;align-items:center}
  .meal-protein{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--push);background:rgba(232,92,58,.08);padding:4px 10px;border-radius:5px}
  .eat-btn{background:var(--green);color:#003322;border:none;padding:7px 14px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;cursor:pointer;letter-spacing:1px}
  .eat-btn.eaten{background:var(--card2);color:var(--green)}
  /* GROCERY */
  .grocery-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden}
  .grocery-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .grocery-cat-dot{width:8px;height:8px;border-radius:50%;background:var(--push);flex-shrink:0}
  .grocery-cat{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;flex:1;text-transform:uppercase}
  .grocery-row{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .grocery-row:last-child{border-bottom:none}
  .grocery-row-top{display:flex;align-items:center;gap:9px;font-size:12.5px;cursor:pointer}
  .grocery-name{color:var(--text);flex:1}
  .grocery-row.checked .grocery-name{color:var(--muted);text-decoration:line-through}
  .grocery-qty{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;margin-right:10px}
  .grocery-price{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
  .grocery-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0c0c0f;transition:all .15s}
  .grocery-check.checked{background:var(--green);border-color:var(--green)}
  .grocery-links{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 0 27px}
  .grocery-link-btn{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.5px;padding:3px 7px;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted2);text-decoration:none;text-transform:uppercase;transition:all .15s}
  .grocery-link-btn:active{background:rgba(255,255,255,.12);color:var(--text)}
  .grocery-progress-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .grocery-progress-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .grocery-progress-head .l{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase}
  .grocery-progress-head .v{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green)}
  .total-bar{background:linear-gradient(135deg,var(--push),#c44a2a);border-radius:14px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;color:white;margin-top:16px}
  .total-bar .l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.8}
  .total-bar .v{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
  /* PREMIUM */
  .premium-divider{margin:28px 0 16px;text-align:center;position:relative}
  .premium-divider::before,.premium-divider::after{content:'';position:absolute;top:50%;width:25%;height:1px;background:var(--border)}
  .premium-divider::before{left:0}.premium-divider::after{right:0}
  .premium-divider .lbl{display:inline-block;background:var(--bg);padding:0 14px;color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px}
  .price-card{background:linear-gradient(135deg,#18181f,#1f1a0a);border:1px solid var(--gold);border-radius:18px;padding:28px 24px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
  .price-card::before{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;background:radial-gradient(circle,rgba(251,191,36,.15),transparent);border-radius:50%}
  .discount-badge{display:inline-block;background:var(--gold);color:#1a1a00;padding:6px 14px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:16px}
  .price-original{font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--muted);text-decoration:line-through;text-decoration-color:var(--red);margin-bottom:4px}
  .price-final{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:4px}
  .price-final .currency{font-size:28px;vertical-align:top}
  .price-period{color:var(--muted2);font-size:13px;margin-bottom:4px}
  .price-trial{color:var(--green);font-size:12px;font-family:'JetBrains Mono',monospace}
  .features-list{background:var(--card);border-radius:14px;padding:20px;margin-bottom:20px}
  .features-list h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;margin-bottom:14px;color:var(--gold)}
  .feature-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
  .feature-row:last-child{border-bottom:none}
  .feature-row .check{color:var(--green);flex-shrink:0;font-weight:bold}
  .promo-section{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:16px;border:1px dashed var(--border2)}
  .promo-hint{font-size:11px;color:var(--gold);margin-bottom:8px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
  .promo-applied{color:var(--green);font-size:11px;margin-top:6px;font-family:'JetBrains Mono',monospace}
  /* RAZORPAY */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
  .razorpay-modal{background:white;color:#1a1a1a;border-radius:16px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;animation:slideUp .3s ease}
  .rzp-header{background:var(--razorpay);color:white;padding:16px 20px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between}
  .rzp-logo{font-weight:800;font-size:18px;letter-spacing:-.5px}
  .rzp-secure{font-size:11px;background:rgba(255,255,255,.2);padding:4px 8px;border-radius:4px}
  .rzp-close{background:none;border:none;color:white;font-size:22px;cursor:pointer;line-height:1;margin-left:10px}
  .rzp-merchant{padding:14px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px}
  .rzp-merchant-logo{width:36px;height:36px;background:var(--push);color:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:'Barlow Condensed',sans-serif}
  .rzp-merchant-name{font-weight:600;font-size:14px}
  .rzp-merchant-amt{color:#666;font-size:12px;margin-top:2px}
  .rzp-body{padding:20px}
  .rzp-amount-row{background:#f5f5f7;border-radius:8px;padding:14px;margin-bottom:16px;text-align:center}
  .rzp-amt-l{font-size:11px;color:#666;margin-bottom:4px}
  .rzp-amt-v{font-size:28px;font-weight:700;color:#1a1a1a}
  .rzp-section-l{font-size:12px;color:#666;margin-bottom:8px;font-weight:600}
  .rzp-method{border:1px solid #ddd;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
  .rzp-method:hover,.rzp-method.selected{border-color:var(--razorpay);background:#f0f7ff}
  .rzp-method-icon{font-size:22px;width:32px;text-align:center}
  .rzp-method-name{font-weight:600;font-size:14px;flex:1}
  .rzp-method-radio{width:18px;height:18px;border:2px solid #ccc;border-radius:50%;flex-shrink:0;position:relative}
  .rzp-method.selected .rzp-method-radio{border-color:var(--razorpay)}
  .rzp-method.selected .rzp-method-radio::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:var(--razorpay);border-radius:50%}
  .rzp-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:12px 14px;font-size:14px;font-family:inherit;margin-bottom:10px}
  .rzp-input:focus{outline:none;border-color:var(--razorpay)}
  .rzp-pay-btn{width:100%;background:var(--razorpay);color:white;border:none;padding:14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
  .rzp-pay-btn:disabled{background:#aaa;cursor:not-allowed}
  .rzp-footer{text-align:center;padding:12px;font-size:10px;color:#999;border-top:1px solid #f0f0f0}
  .rzp-footer strong{color:var(--razorpay)}
  /* CYCLE PAGE */
  .phase-hero{border-radius:16px;padding:24px;margin-bottom:20px;text-align:center}
  .phase-hero.menstrual{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3)}
  .phase-hero.follicular{background:linear-gradient(135deg,rgba(52,211,153,.15),rgba(52,211,153,.05));border:1px solid rgba(52,211,153,.3)}
  .phase-hero.ovulatory{background:linear-gradient(135deg,rgba(245,166,35,.15),rgba(245,166,35,.05));border:1px solid rgba(245,166,35,.3)}
  .phase-hero.luteal{background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(167,139,250,.05));border:1px solid rgba(167,139,250,.3)}
  .phase-icon{width:48px;height:48px;border-radius:50%;margin:0 auto 10px;border:2px solid currentColor;opacity:.7}
  .phase-name{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;margin-bottom:6px}
  .phase-days{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;margin-bottom:12px}
  .phase-sub{font-size:13px;line-height:1.6}
  .cycle-pill{display:inline-block;padding:6px 16px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
  .cycle-bar{display:flex;gap:3px;margin-bottom:24px;border-radius:99px;overflow:hidden;height:10px;background:var(--border)}
  .cycle-seg{height:100%;flex:1}
  .seg-men{background:var(--cycle-men)}.seg-fol{background:var(--cycle-fol)}.seg-ov{background:var(--cycle-ov)}.seg-lut{background:var(--cycle-lut)}
  .phase-section{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px}
  .phase-section-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .phase-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
  .phase-item:last-child{border-bottom:none}
  .phase-item .pi{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;margin-top:6px;opacity:.7}
  .phase-item .pt{color:var(--text);line-height:1.4}
  .phase-item .pt span{color:var(--muted2);font-size:11.5px;display:block;margin-top:1px}
  .avoid-tag{background:rgba(239,68,68,.1);color:var(--red);border-radius:6px;padding:10px 14px;font-size:12px;margin-bottom:8px;border:1px solid rgba(239,68,68,.2)}
  .do-tag{background:rgba(52,211,153,.1);color:var(--green);border-radius:6px;padding:10px 14px;font-size:12px;margin-bottom:8px;border:1px solid rgba(52,211,153,.2)}
  /* PROFILE */
  .profile-head{text-align:center;padding:24px 0}
  .avatar{width:80px;height:80px;background:var(--push);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:white}
  .avatar.female{background:var(--cycle-pink)}
  .profile-name{font-size:22px;font-weight:700;margin-bottom:4px}
  .profile-email{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace}
  .profile-section{background:var(--card);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .profile-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
  .profile-row:last-child{border-bottom:none}
  .profile-row:hover{background:var(--card2)}
  .profile-row .l{font-size:13px}
  .profile-row .v{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .premium-banner{background:linear-gradient(135deg,var(--gold),#d97706);color:#1a1a00;border-radius:14px;padding:18px 20px;margin-bottom:16px;cursor:pointer}
  .premium-banner.active{background:linear-gradient(135deg,var(--green),#059669);color:#003322}
  .premium-banner h4{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;margin-bottom:4px}
  .premium-banner p{font-size:12px;opacity:.9}
  /* ACHIEVEMENTS */
  .achievement-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
  .achievement-card{background:var(--card);border-radius:12px;padding:12px 6px;text-align:center}
  .achievement-card .ai{font-size:28px;display:block;margin-bottom:4px}
  .achievement-card .an{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .achievement-card.earned{border:1px solid var(--gold)}
  .achievement-card.earned .an{color:var(--gold)}
  /* BODY MEASUREMENTS */
  .body-meas-section{background:var(--card);border-radius:14px;padding:18px;margin-top:20px;margin-bottom:14px}
  .body-meas-section h4{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;margin-bottom:12px}
  .meas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  /* PROGRESS */
  .stat-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .stat-block{background:var(--card);border-radius:10px;padding:14px 10px;text-align:center}
  .stat-block .v{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--push);line-height:1}
  .stat-block .l{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:grid;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:50;backdrop-filter:blur(10px)}
  .bottom-nav.male{grid-template-columns:repeat(7,1fr)}
  .bottom-nav.female{grid-template-columns:repeat(8,1fr)}
  .nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase}
  .nav-btn.active{color:var(--push)}
  .nav-btn.active.pink-nav{color:var(--cycle-pink)}
  .nav-btn .ico{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
  .nav-btn .ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  /* TOAST / MODAL */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:12px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:200;animation:slideUp .3s ease;box-shadow:0 10px 40px rgba(0,0,0,.4);white-space:nowrap}
  .toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
  .gen-modal{background:var(--card);border-radius:18px;padding:28px 24px;width:100%;max-width:380px;animation:slideUp .3s ease}
  .success-screen{text-align:center;padding:60px 20px}
  .success-icon{width:80px;height:80px;background:var(--green);border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#003322;animation:bounceIn .5s ease}
  /* CYCLE WIDGET ON HOME */
  .cycle-home-card{border-radius:14px;padding:16px 18px;margin-bottom:16px;cursor:pointer;border:1px solid transparent}
  .cycle-home-card.menstrual{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
  .cycle-home-card.follicular{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.3)}
  .cycle-home-card.ovulatory{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.3)}
  .cycle-home-card.luteal{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.3)}
  .cycle-home-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .cycle-home-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase}
  .cycle-home-phase{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase}
  .cycle-home-tip{font-size:12px;color:var(--muted2);line-height:1.5}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
  .fade-in{animation:fadeIn .3s ease}
  ::-webkit-scrollbar{width:0}
  @media(min-width:600px){body{background:#050507}.page{background:var(--bg);border-radius:24px;margin:20px auto;max-width:420px;min-height:calc(100vh - 40px);box-shadow:0 20px 60px rgba(0,0,0,.6)}}
  /* TRAINERS */
  .trainer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .trainer-card{background:var(--card);border-radius:14px;overflow:hidden;position:relative;cursor:pointer;transition:all .15s}
  .trainer-card:hover{background:var(--card2)}
  .trainer-avatar{height:90px;display:flex;align-items:center;justify-content:center;background:var(--card2)}
  .trainer-initials{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;letter-spacing:1px;color:var(--push);opacity:.85}
  .trainer-body{padding:12px}
  .trainer-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;margin-bottom:2px;line-height:1.1}
  .trainer-spec{font-size:10px;color:var(--muted2);margin-bottom:6px;line-height:1.4}
  .trainer-rating{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);margin-bottom:3px}
  .trainer-price{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green)}
  .trainer-detail-header{background:linear-gradient(135deg,var(--card2),var(--card));border-radius:14px;padding:24px;text-align:center;margin-bottom:16px}
  .trainer-detail-initials{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;color:var(--push);letter-spacing:2px;margin-bottom:10px;opacity:.85}
  .trainer-detail-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;margin-bottom:4px}
  .trainer-detail-spec{color:var(--muted2);font-size:13px;margin-bottom:12px}
  .trainer-stats{display:flex;justify-content:center;gap:24px}
  .trainer-stat{text-align:center}
  .trainer-stat .v{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--push)}
  .trainer-stat .l{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  /* WORKOUT LOG */
  .timer-display{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;text-align:center;color:var(--push);letter-spacing:-2px;line-height:1;margin:12px 0}
  .timer-controls{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
  .ex-log-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px}
  .ex-log-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .set-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
  .set-row:last-child{border-bottom:none}
  .set-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:24px;flex-shrink:0}
  .set-input{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 6px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;width:60px;text-align:center}
  .set-input:focus{outline:none;border-color:var(--push)}
  .set-x{color:var(--muted);font-size:12px;flex-shrink:0}
  .set-done-btn{background:none;border:2px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}
  .set-done-btn.done{background:var(--green);border-color:var(--green);color:#003322}
  /* WORKOUT HISTORY */
  .history-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
  .history-card:hover{background:var(--card2)}
  .history-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
  .history-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;margin-bottom:6px}
  .history-meta{display:flex;gap:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2)}
  .history-sets{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:none}
  .history-sets.open{display:block}
  /* AI CHAT */
  .chat-wrap{padding:16px 16px 130px;display:flex;flex-direction:column;gap:12px;min-height:calc(100vh - 80px)}
  .bubble-row{display:flex}
  .bubble-row.user{justify-content:flex-end}
  .chat-bubble{max-width:82%;padding:12px 14px;border-radius:14px;font-size:13.5px;line-height:1.6}
  .chat-bubble.ai{background:var(--card);border-bottom-left-radius:4px}
  .chat-bubble.user{background:var(--push);color:white;border-bottom-right-radius:4px}
  .chat-bubble .ai-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px}
  .chat-input-bar{position:fixed;bottom:70px;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;z-index:40;max-width:480px;margin:0 auto}
  .chat-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-family:'Barlow',sans-serif;font-size:14px}
  .chat-input:focus{outline:none;border-color:var(--push)}
  .chat-send{background:var(--push);color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .suggest-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .suggest-chip{background:var(--card);border:1px solid var(--border);color:var(--muted2);padding:8px 14px;border-radius:99px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
  .suggest-chip:hover{border-color:var(--push);color:var(--text)}
  /* GYM SCANNER */
  .scanner-preview{width:100%;height:220px;background:var(--card2);border-radius:14px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:2px dashed var(--border2);margin-bottom:16px}
  .scanner-preview video,.scanner-preview img{width:100%;height:100%;object-fit:cover}
  .scan-loading-step{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:10px;margin-bottom:8px;transition:all .3s}
  .scan-loading-step.done{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2)}
  .scan-step-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0}
  .scan-step-text .ttl{font-size:13px;font-weight:600;margin-bottom:2px}

async function saveData(key,value){
  const s=JSON.stringify(value);
  try{if(window.storage&&window.storage.set)await window.storage.set(key,s);else localStorage.setItem(key,s);}
  catch(e){try{localStorage.setItem(key,s)}catch(e2){}}
}
function checkStorageQuota(){
  try{
    const used=new Blob(Object.values(localStorage)).size;
    const limit=5*1024*1024;
    if(used>limit*0.9)console.warn('LocalStorage >90% full:',Math.round(used/1024)+'KB');
    return used<limit*0.95;
  }catch(e){return true;}
}
async function loadData(key){
  try{
    if(window.storage&&window.storage.get){const r=await window.storage.get(key);if(r&&r.value)return JSON.parse(r.value);}
    const r=localStorage.getItem(key);return r?JSON.parse(r):null;
  }catch(e){return null}
}

function canScan(){
  if(State.currentUser?.isPremium)return true;
  try{
    const scans=JSON.parse(localStorage.getItem('ff_scan_dates')||'[]');
    const now=new Date();
    const thisMonth=scans.filter(d=>{const sd=new Date(d);return sd.getMonth()===now.getMonth()&&sd.getFullYear()===now.getFullYear();});
    return thisMonth.length<3;
  }catch(e){return true;}
}
function getScansRemaining(){
  if(State.currentUser?.isPremium)return '∞';
  try{
    const scans=JSON.parse(localStorage.getItem('ff_scan_dates')||'[]');
    const now=new Date();
    const thisMonth=scans.filter(d=>{const sd=new Date(d);return sd.getMonth()===now.getMonth()&&sd.getFullYear()===now.getFullYear();});
    return Math.max(0,3-thisMonth.length);
  }catch(e){return 3;}
}
function markScanned(){
  try{
    const scans=JSON.parse(localStorage.getItem('ff_scan_dates')||'[]');
    scans.push(new Date().toISOString());
    localStorage.setItem('ff_scan_dates',JSON.stringify(scans));
  }catch(e){}
}
async function apiCall(method,path,body,retries=1){
  const token=getJwt();
  for(let attempt=0;attempt<=retries;attempt++){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),10000);
      const res=await fetch(API_BASE+path,{
        method,signal:ctrl.signal,
        headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})},
        ...(body?{body:JSON.stringify(body)}:{})
      });
      clearTimeout(tid);
      if(!res.ok){const e=await res.json().catch(()=>({}));console.warn('FF API',path,e.message||res.status);return null;}
      return await res.json();
    }catch(e){
      console.warn('FF API attempt',attempt+1,path,e.message);
      if(attempt<retries)await new Promise(r=>setTimeout(r,2000));
    }
  }
  return null;
}

// ============================================================
// GENDERED EXERCISE FIGURES
// Recolors the muscular body illustrations above into a male or
// female figure (skin tone, outfit accent) based on the
// signed-in user's gender, while keeping each exercise's
// equipment and movement animation exactly as drawn in SVG{}.
// ============================================================
const FIGURE_PALETTE = {
  male:  {skin:'#c4956a', outfit:'#2d2d42', hair:'#2b1f17'},
  female:{skin:'#c4956a', outfit:'#6b3654', hair:'#3a2418', tie:'#f472b6'}
};
function figureGenderFor(gender){return gender==='female'?'female':'male'}
function headGroup(cx,cy,gender){
  const p=FIGURE_PALETTE[gender];
  if(gender==='female'){
    return`<ellipse cx="${cx-8}" cy="${cy-2}" rx="8" ry="10" fill="${p.hair}"/>`
      +`<path d="M${cx-7} ${cy+5} q-3 9 -1 18 q4 3 6 -1 q2 -9 0 -17Z" fill="${p.hair}"/>`
      +`<circle cx="${cx-1}" cy="${cy+20}" r="2.5" fill="${p.tie}"/>`
      +`<circle cx="${cx}" cy="${cy}" r="12" fill="${p.skin}"/>`;
  }
  return`<path d="M${cx-12} ${cy-1} a12 10 0 0 1 24 0 a12 5 0 0 0 -24 0Z" fill="${p.hair}"/>`
    +`<circle cx="${cx}" cy="${cy}" r="12" fill="${p.skin}"/>`;
}
function genderizeSVG(svg,gender){
  gender=figureGenderFor(gender);
  const p=FIGURE_PALETTE[gender];
  return svg
    .replace(/<circle cx="([\d.]+)" cy="([\d.]+)" r="12" fill="#c4956a"\/>/g,(m,cx,cy)=>headGroup(+cx,+cy,gender))
    .replace(/fill="#c4956a"/g,`fill="${p.skin}"`)
    .replace(/fill="#3a3a4f"/g,`fill="${p.outfit}"`);
}

async function fetchExerciseGifs(){
  const key=getWorkoutXKey();
  if(!key)return;
  const cached=getExerciseGifs();
  const names=Object.keys(EXERCISE_SEARCH_MAP);
  const toFetch=names.filter(n=>!cached[n]);
  if(!toFetch.length)return;
  showToast(`Loading exercise demos (${toFetch.length})…`);
  for(const name of toFetch){
    const q=EXERCISE_SEARCH_MAP[name];
    try{
      const res=await fetch(`https://api.workoutxapp.com/v1/exercises?search=${encodeURIComponent(q)}&limit=1`,{
        headers:{'X-WorkoutX-Key':key}
      });
      if(!res.ok)continue;
      const data=await res.json();
      const ex=Array.isArray(data)?data[0]:data?.exercises?.[0]||data?.[0];
      if(ex?.gifUrl){setExerciseGif(name,ex.gifUrl);}
    }catch(e){console.warn('WorkoutX fetch failed for',name,e.message);}
    await new Promise(r=>setTimeout(r,200));
  }
  showToast('Exercise demos loaded ✓');
  if(['workouts'].includes(State.currentPage))render();
}

  const east=['Kolkata','Patna','Bhubaneswar','Ranchi','Guwahati'];
  const c=(city||'').trim();
  if(south.some(s=>c.toLowerCase().includes(s.toLowerCase())))return 'south';
  if(west.some(s=>c.toLowerCase().includes(s.toLowerCase())))return 'west';
  if(north.some(s=>c.toLowerCase().includes(s.toLowerCase())))return 'north';

}

// GROCERY QUICK-BUY LINKS — Zepto / Blinkit / Instamart / BigBasket / Amazon Fresh
// Each grocery item gets deep links straight to that item's search
// results on every platform, so the user can buy from whichever is
// cheapest. AFFILIATE SETUP (do this once each program approves you):
//  - amazonTag: your Amazon Associates Store ID -> adds &tag=... to Amazon links
//  - wrapperUrl: most Indian quick-commerce affiliate programs (Cuelinks,
//    INRDeals, EarnKaro, Admitad, etc.) hand you a redirect/cloaking prefix —
//    paste it here and it will wrap the Zepto/Blinkit/BigBasket/Instamart
//    links (destination URL is appended URL-encoded).
// ------------------------------------------------------------
const AFFILIATE_CONFIG = {
  amazonTag: '',   // e.g. 'fitforge-21'
  wrapperUrl: ''   // e.g. 'https://inr.deals/in?url='
};
function groceryLinks(itemName){
  const q=encodeURIComponent(itemName.replace(/\(.*?\)/g,'').trim());
  const wrap=url=>AFFILIATE_CONFIG.wrapperUrl?AFFILIATE_CONFIG.wrapperUrl+encodeURIComponent(url):url;
  return[
    {label:'Blinkit',url:wrap(`https://blinkit.com/s/?q=${q}`)},
    {label:'Zepto',url:wrap(`https://www.zeptonow.com/search?query=${q}`)},
    {label:'Instamart',url:wrap(`https://www.swiggy.com/instamart/search?custom_back=true&query=${q}`)},
    {label:'BigBasket',url:wrap(`https://www.bigbasket.com/ps/?q=${q}`)},
    {label:'Amazon',url:`https://www.amazon.in/s?k=${q}&i=nowstore${AFFILIATE_CONFIG.amazonTag?`&tag=${AFFILIATE_CONFIG.amazonTag}`:''}`}
  ];
}

function getAIReply(text){
  const t=text.toLowerCase();
  let r;
  if(t.includes('protein')||t.includes('whey')||t.includes('amino'))r=AI_RESP.protein;
  else if(t.includes('calori')||t.includes('deficit')||t.includes('tdee')||t.includes('mainten'))r=AI_RESP.calories;
  else if(t.includes('fat')||t.includes('macro')||t.includes('omega'))r=AI_RESP.fat;
  else if(t.includes('workout')||t.includes('exercise')||t.includes('train')||t.includes('lift')||t.includes('rep')||t.includes('set'))r=AI_RESP.workout;
  else if(t.includes('sleep')||t.includes('recover')||t.includes('rest'))r=AI_RESP.sleep;
  else if(t.includes('supple')||t.includes('creatine')||t.includes('vitamin')||t.includes('pre-workout'))r=AI_RESP.supplement;
  else if(t.includes('cardio')||t.includes('hiit')||t.includes('run')||t.includes('treadmill'))r=AI_RESP.cardio;
  else r=AI_RESP.default;
  return r[Math.floor(Math.random()*r.length)];
}

// Safe {{key}} interpolation for AI_RESP fallback strings — no eval().
function fillAIVars(text){
  const u=State.currentUser,m=u?.macros||{};
  const vars={
    weight2x:Math.round((u?.weight||70)*2),
    tdee:m.tdee||2400,
    calories:m.calories||1900,
    fats:m.fats||60,
    protein:m.protein||155
  };
  return text.replace(/\{\{(\w+)\}\}/g,(_,k)=>k in vars?vars[k]:'');
}

function getEquipmentIcon(name){
  const n=name.toLowerCase();
  if(n.includes('barbell')||n.includes('rack'))return'BB';
  if(n.includes('dumbbell'))return'DB';
  if(n.includes('cable'))return'CBL';
  if(n.includes('bench'))return'BCH';
  if(n.includes('pull-up')||n.includes('chin'))return'PU';
  if(n.includes('leg press'))return'LP';
  if(n.includes('band'))return'BND';
  if(n.includes('kettlebell'))return'KB';
  if(n.includes('treadmill'))return'TRD';
  if(n.includes('bike')||n.includes('cycle'))return'BIKE';
  if(n.includes('smith'))return'SM';
  if(n.includes('yoga')||n.includes('mat'))return'YGA';
  if(n.includes('pole')||n.includes('mallakhamba')||n.includes('rope'))return'MLK';
  return'GYM';
}

function matchEquipment(detected){
  const kw={
    barbell:['barbell','power rack','squat rack','olympic bar'],
    dumbbells:['dumbbell'],
    cable:['cable','functional trainer'],
    bench:['bench'],
    pullup:['pull-up','pull up','pullup','chin-up','chin up','bar'],
    legpress:['leg press'],
    bands:['band','resistance band','elastic'],
    kettlebell:['kettlebell','kettle bell'],
    yoga:['yoga','mat','yoga mat','stretching area'],
    mallakhamba:['pole','mallakhamba','rope','climbing rope'],
    pranayama:['yoga','mat','open space','breathing area']
  };
  const matched=new Set(['bodyweight']);
  detected.forEach(item=>{
    const l=item.toLowerCase();
    Object.entries(kw).forEach(([key,words])=>{if(words.some(w=>l.includes(w)))matched.add(key);});
  });
  return[...matched];
}

function buildResultsFromEquipment(detected,userMacros){
  const matched=matchEquipment(detected);
  const pool=[];
  matched.forEach(k=>{if(SCAN_EXERCISES[k])pool.push(...SCAN_EXERCISES[k]);});
  const seen=new Set();
  const unique=pool.filter(e=>seen.has(e.n)?false:seen.add(e.n));
  const byFocus=f=>unique.filter(e=>e.focus===f).slice(0,5);
  const fullBody=unique.filter(e=>e.focus==='full').concat(byFocus('push').slice(0,2),byFocus('pull').slice(0,2)).filter((e,i,a)=>a.findIndex(x=>x.n===e.n)===i).slice(0,5);

  const has=k=>matched.includes(k);
  const insights=[];
  if(has('barbell')&&has('dumbbells')&&has('cable'))insights.push('Your gym has everything needed for the full PPL + Full Body split. No equipment gaps.');
  else if(has('dumbbells')&&!has('barbell'))insights.push('Dumbbell-only setup — slightly higher rep ranges (10–15) will maximise hypertrophy without a barbell.');
  if(!has('cable'))insights.push('No cable machine detected. Resistance bands are a solid substitute for constant-tension exercises.');
  if(has('cable'))insights.push('Cable machine detected — prioritise face pulls 2×/week. Most people skip rear delts and it shows.');
  if(!has('pullup'))insights.push('No pull-up bar detected. A doorframe bar (~₹600) is the highest ROI home gym tool.');
  insights.push('Log your compound lifts weekly. Progressive overload is the single biggest driver of results.');

  const m=userMacros||{protein:165,carbs:195,fats:62};
  return{

function buildResultsFromBackendScan(scan){
  const confToNum=c=>c==='high'?96:c==='medium'?85:72;
  const focusColor=f=>{
    const l=(f||'').toLowerCase();
    if(l.includes('push')||l.includes('chest')||l.includes('shoulder')||l.includes('tricep'))return'push';
    if(l.includes('pull')||l.includes('back')||l.includes('bicep'))return'pull';
    if(l.includes('leg')||l.includes('squat')||l.includes('glute'))return'legs';
    return'full';
  };
  const equipment=(scan.equipment||[]).map(e=>({name:e.name,icon:getEquipmentIcon(e.name),conf:confToNum(e.confidence)}));
  const workoutDays=(scan.workout_plan?.days||[]).map((d,i)=>({
    day:d.day_name||`Day ${i+1}`,
    focus:(d.focus||'FULL BODY').toUpperCase(),
    color:focusColor(d.focus),
    exs:(d.exercises||[]).map(e=>({n:e.name,s:`${e.sets}×${e.reps}`,t:e.technique_tip||(e.rest_seconds?`${e.rest_seconds}s rest`:'')}))
  }));
  const diet=scan.diet||{};
  const dietSummary={
    protein:diet.protein_g||150,carbs:diet.carbs_g||200,fats:diet.fats_g||65,
    meals:(diet.meals||[]).map(m=>({t:m.time||'',n:m.name||'',f:Array.isArray(m.foods)?m.foods.join(' + '):(m.foods||''),p:m.protein_g||0}))
  };
  const byCat={};
  (scan.grocery_list||[]).forEach(item=>{
    const cat=(item.category||'other').charAt(0).toUpperCase()+(item.category||'other').slice(1);
    if(!byCat[cat])byCat[cat]=[];
    byCat[cat].push({n:item.item,q:item.quantity,p:`₹${item.weekly_cost_inr}`});
  });
  const groceryItems=Object.entries(byCat).map(([cat,items])=>({cat,items}));
  const ins=scan.ai_insights||{};
  const aiInsights=[
    ...(ins.strengths||[]),
    ...(ins.missing_equipment||[]).map(m=>`Missing: ${m}`),
    ins.pro_tip||null,
    ins.motivation_message||null
  ].filter(Boolean);
  return{
    equipment:equipment.length?equipment:GYM_SCAN_DEMO.equipment,
    workoutDays:workoutDays.length?workoutDays:GYM_SCAN_DEMO.workoutDays,
    dietSummary:dietSummary.meals?.length?dietSummary:GYM_SCAN_DEMO.dietSummary,
    groceryItems:groceryItems.length?groceryItems:GYM_SCAN_DEMO.groceryItems,
    aiInsights:aiInsights.length?aiInsights:GYM_SCAN_DEMO.aiInsights
  };
}

async function callGeminiScan(images,apiKey){
  const parts=images.map(img=>{
    const[header,data]=img.split(',');
    const mt=header.match(/:([^;]+)/);
    return{inline_data:{mime_type:mt?mt[1]:'image/jpeg',data}};
  });
  parts.push({text:`You are a gym equipment identifier. Analyse these images and return ONLY a JSON object.
Format: { "equipment": ["barbell", "dumbbells", "cable machine", "bench", "pull-up bar"] }
Only include equipment clearly visible. Be specific (e.g. "adjustable dumbbells" not "weights").`});
  const res=await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents:[{parts}],generationConfig:{responseMimeType:'application/json'}})}
  );
  if(!res.ok){const e=await res.text();throw new Error(`Gemini ${res.status}: ${e.slice(0,200)}`);}
  const d=await res.json();
  const text=d.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text)throw new Error('Empty Gemini response');
  return JSON.parse(text);
}

function calcMacros(weight,height,age,activity,gender='male'){
  const bmr=10*weight+6.25*height-5*age+(gender==='male'?5:-161);
  const mult={sedentary:1.2,light:1.375,active:1.55}[activity]||1.3;
  const tdee=Math.round(bmr*mult);
  const calories=tdee-500;
  const protein=Math.round(weight*2);
  const fats=Math.round((calories*0.28)/9);
  const carbs=Math.round((calories-protein*4-fats*9)/4);
  return{tdee,calories,protein,fats,carbs};
}

function getCurrentPhase(lastPeriodStart,cycleLength=28){
  if(!lastPeriodStart)return null;
  const today=new Date();
  const start=new Date(lastPeriodStart);
  const diff=Math.floor((today-start)/(1000*60*60*24));
  const day=((diff%cycleLength)+cycleLength)%cycleLength+1;
  if(day<=5)return{phase:'menstrual',day,daysLeft:6-day};
  if(day<=13)return{phase:'follicular',day,daysLeft:14-day};
  if(day<=16)return{phase:'ovulatory',day,daysLeft:17-day};
  return{phase:'luteal',day,daysLeft:cycleLength-day+1};
}

function getDaysUntilNextPeriod(lastPeriodStart,cycleLength=28){
  if(!lastPeriodStart)return null;
  const today=new Date();
  const start=new Date(lastPeriodStart);
  const diff=Math.floor((today-start)/(1000*60*60*24));
  const day=((diff%cycleLength)+cycleLength)%cycleLength+1;
  return cycleLength-day+1;
}

function syncCycleToPartner(){
  const u=State.currentUser;
  if(!getJwt()||u?.gender!=='female'||!u.lastPeriod)return;
  const ph=getCurrentPhase(u.lastPeriod,u.cycleLength||28);
  const dNext=getDaysUntilNextPeriod(u.lastPeriod,u.cycleLength||28);
  if(!ph||dNext==null)return;
  const next=new Date();next.setDate(next.getDate()+dNext);
  apiCall('POST','/partner/sync-cycle',{nextPeriodDate:next.toISOString().slice(0,10),currentPhase:ph.phase}).catch(()=>{});
}

async function signup(name,email,password){
  const res=await apiCall('POST','/auth/register',{name,email,password});
  if(res?.token){
    setJwt(res.token);
    State.currentUser={name,email,isPremium:res.user?.isPremium||false,onboarded:false};
    await saveData('user_'+email,State.currentUser);
    await saveData('currentUserEmail',email);
    return;
  }
  // Offline fallback — local only
  const users=(await loadData('users'))||{};
  if(users[email])throw new Error('Email already registered');
  users[email]={name,email,password,created:Date.now()};
  await saveData('users',users);
  await saveData('currentUserEmail',email);
  State.currentUser={name,email,isPremium:false,onboarded:false};
  await saveData('user_'+email,State.currentUser);
}

async function login(email,password){
  const res=await apiCall('POST','/auth/login',{email,password});
  if(res?.token){
    setJwt(res.token);
    const local=(await loadData('user_'+email))||{};
    State.currentUser={...local,name:res.user.name,email:res.user.email,isPremium:res.user.isPremium||false,_id:res.user.id||res.user._id};
    await saveData('currentUserEmail',email);
    await saveData('user_'+email,State.currentUser);
    return;
  }
  // Offline fallback — local only
  const users=(await loadData('users'))||{};
  if(!users[email])throw new Error('No account found with this email');
  if(users[email].password!==password)throw new Error('Wrong password');
  const profile=(await loadData('user_'+email))||{name:users[email].name,email,isPremium:false,onboarded:false};
  State.currentUser=profile;
  await saveData('currentUserEmail',email);
}

async function logout(){
  setJwt(null);
  State.currentUser=null;
  await saveData('currentUserEmail',null);
  goto('landing');
}

// Lazy background fetch of backend data when navigating to certain pages.
// Falls back silently (apiCall returns null) — relevant render*() functions
// already handle State.* being unset by using local data.
function fetchPageData(page){
  const u=State.currentUser;
  if(!u||!getJwt())return;
  if(page==='diet'&&!State.dietPlan){
    apiCall('GET','/diet/plan').then(r=>{
      if(r&&r.macros&&r.meals){State.dietPlan=r;if(State.currentPage==='diet')render();}
    });
  }
  if(page==='grocery'&&!State.groceryData){
    apiCall('GET','/groceries'+(u.state?'?state='+encodeURIComponent(u.state):u.city?'?city='+encodeURIComponent(u.city):'')).then(r=>{
      if(r&&r.grocery){State.groceryData=r;if(State.currentPage==='grocery')render();}
    });
  }
  if(page==='grocery'&&State.groceryChecked===null){
    State.groceryChecked={};
    if(u.email)loadData('grocery_checked_'+u.email).then(saved=>{
      if(saved&&Object.keys(saved).length){State.groceryChecked=saved;if(State.currentPage==='grocery')render();}
    });
  }
  if(page==='trainers'&&!State.trainersData){
    apiCall('GET','/trainers'+(u.city?'?city='+encodeURIComponent(u.city):'')).then(r=>{
      if(r&&Array.isArray(r.trainers)){
        State.trainersData=r.trainers.map(mapBackendTrainer);
        State.trainersPreviewOnly=!!r.previewOnly;
        if(State.currentPage==='trainers')render();
      }
    });
  }
  if(page==='trainer-detail'&&State.trainersData&&State.currentTrainerId){
    apiCall('GET','/trainers/'+State.currentTrainerId).then(r=>{
      if(r&&r.trainer){
        const mapped=mapBackendTrainer(r.trainer);
        const idx=State.trainersData.findIndex(x=>x.id===mapped.id);
        if(idx>=0)State.trainersData[idx]={...State.trainersData[idx],...mapped};else State.trainersData.push(mapped);
        if(State.currentPage==='trainer-detail')render();
      }
    });
  }
}

window.toggleGroceryItem=key=>{
  if(!State.groceryChecked)State.groceryChecked={};
  State.groceryChecked[key]=!State.groceryChecked[key];
  if(State.currentUser?.email)saveData('grocery_checked_'+State.currentUser.email,State.groceryChecked);
  render();
};

function groceryRowHtml(key,item,isChecked){
  const safeKey=key.replace(/'/g,"\\'");
  return`<div class="grocery-row ${isChecked?'checked':''}">
    <div class="grocery-row-top" onclick="toggleGroceryItem('${safeKey}')">
      <div class="grocery-check ${isChecked?'checked':''}">${isChecked?'✓':''}</div>
      <div class="grocery-name">${item.name}</div>
      <div class="grocery-qty">${item.qty}</div>
      <div class="grocery-price">${item.price}</div>
    </div>
    <div class="grocery-links">${groceryLinks(item.name).map(l=>`<a class="grocery-link-btn" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${l.label}</a>`).join('')}</div>
  </div>`;
}

function renderGrocery(){
  const u=State.currentUser;
  const prices=CITY_PRICES[u.city]||CITY_PRICES.Default;
  const isVeg=u.diet==='veg';
  const gd=State.groceryData;
  const checked=State.groceryChecked||{};

  const cards=gd&&gd.grocery?Object.entries(gd.grocery).map(([cat,items])=>({
    cat,items:items.map(i=>({name:i.item,qty:i.quantity,price:`₹${i.price_inr}`}))
  })):[
    {cat:'Eggs (Foundation)',items:[{name:'Eggs (30 pack/week)',qty:'30/wk',price:`₹${prices.eggs*30}`},{name:'Local kirana / D-Mart',qty:`₹${prices.eggs}/egg`,price:'—'}]},
    !isVeg?{cat:'Chicken (Non-veg)',items:[{name:'Chicken breast raw',qty:'500g/wk',price:`₹${Math.round(prices.chicken/2)}`},{name:'Local butcher',qty:`₹${prices.chicken}/kg`,price:'—'}]}:null,
    {cat:'Paneer',items:[{name:'Paneer block fresh',qty:'400g/wk',price:`₹${Math.round(prices.paneer*0.4)}`},{name:'Amul / local dairy',qty:`₹${prices.paneer}/kg`,price:'—'}]},
    {cat:'Curd / Dahi',items:[{name:'Low-fat curd',qty:'1kg × 2/wk',price:'₹120'}]},
    {cat:'Roasted Chana',items:[{name:'Roasted chana unsalted',qty:'500g/wk',price:'₹80'},{name:'Office zip-lock snack',qty:'100g = 17g P',price:'—'}]},
    {cat:'Fruits',items:[{name:'Bananas',qty:'8-10/wk',price:'₹40'},{name:'Apples',qty:'4-5/wk',price:'₹60'}]},
    {cat:'Cooking Basics',items:[{name:'Onions 500g',qty:'—',price:'₹25'},{name:'Tomatoes 6-8pcs',qty:'—',price:'₹30'},{name:'Sunflower oil 500ml',qty:'—',price:'₹70'}]},
    {cat:'Spices (Monthly)',items:[{name:'Salt, Haldi, Chilli',qty:'1×/mo',price:'₹60'},{name:'Garam masala, Cumin',qty:'1×/mo',price:'₹50'}]},
    {cat:'Carbs',items:[{name:'Multigrain bread',qty:'1 loaf/wk',price:'₹45'},{name:'Ready chapati pack',qty:'1 pack/wk',price:'₹55'}]}
  ].filter(Boolean);
  const total=gd&&gd.grocery?gd.totalWeeklyInr:prices.total;

  // Cycle-specific grocery for women
  let cycleCard=null;
  if(u.gender==='female'&&u.lastPeriod){
    const ph=getCurrentPhase(u.lastPeriod,u.cycleLength||28);
    if(ph){
      const pd=PHASE_DATA[ph.phase];
      cycleCard={cat:`${pd.name} Phase Additions`,color:pd.color,items:pd.grocery};
    }
  }

  // Flatten every recommended item (regular + cycle) into one checklist for the progress bar.
  const allItems=[...cards,...(cycleCard?[cycleCard]:[])].flatMap(c=>c.items.map(i=>({key:`${c.cat}::${i.name}`,i})));
  const totalItems=allItems.length;
  const checkedCount=allItems.filter(({key})=>checked[key]).length;
  const pct=totalItems?Math.round(checkedCount/totalItems*100):0;

  return`<div class="page fade-in">
    <h1 class="display page-title">GROCERY LIST</h1>
    <p class="page-sub">For ${u.state?u.state+' ('+u.city+')':u.city||'your city'} · ${u.diet||'veg'} diet</p>
    <div class="grocery-progress-card">
      <div class="grocery-progress-head">
        <div class="l">Diet Checklist Progress</div>
        <div class="v">${checkedCount} / ${totalItems} · ${pct}%</div>
      </div>
      <div class="progress-track"><div class="progress-fill green" style="width:${pct}%"></div></div>
    </div>
    ${cards.map(c=>`<div class="grocery-card">
      <div class="grocery-head"><div class="grocery-cat-dot"></div><div class="grocery-cat">${c.cat}</div></div>
      ${c.items.map(i=>groceryRowHtml(`${c.cat}::${i.name}`,i,!!checked[`${c.cat}::${i.name}`])).join('')}
    </div>`).join('')}
    ${cycleCard?`<div style="margin-top:20px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:${cycleCard.color};letter-spacing:2px;margin-bottom:6px">${cycleCard.cat.toUpperCase()}</div>
      <div class="grocery-card" style="border:1px solid ${cycleCard.color}30">
        <div class="grocery-head"><div class="grocery-cat-dot"></div><div class="grocery-cat">${cycleCard.cat}</div></div>
        ${cycleCard.items.map(i=>groceryRowHtml(`${cycleCard.cat}::${i.name}`,i,!!checked[`${cycleCard.cat}::${i.name}`])).join('')}
      </div>
    </div>`:''}
    <div class="total-bar"><div><div class="l">Weekly Estimate</div><div class="v">₹${total}</div></div></div>
  </div>`;
}

function renderCycle(){

    </div>`;

  return`<div class="page fade-in">

      <div class="phase-days mono" style="color:${pd.color}">${pd.days}</div>
      <div class="phase-sub">${pd.tagline}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">
      <div class="stat-block"><div class="v" style="color:var(--cycle-pink)">${ph.daysLeft}</div><div class="l">Days in Phase</div></div>

    <div style="margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase">Cycle Overview</div>
    ${cycleBar}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:24px;font-size:9px;font-family:'JetBrains Mono',monospace;text-align:center">
      <div style="color:var(--cycle-men)">1-5<br>MEN</div>
      <div style="color:var(--cycle-fol)">6-13<br>FOL</div>
      <div style="color:var(--cycle-ov)">14-16<br>OV</div>
      <div style="color:var(--cycle-lut)">17-${cl}<br>LUT</div>
    </div>

    <div class="phase-section">
      <div class="phase-section-title" style="color:${pd.color}">Workout This Phase</div>
      ${ph.phase==='menstrual'?`<div class="avoid-tag">Avoid: ${pd.avoid.join(' · ')}</div>`:''}
      ${ph.phase==='luteal'?`<div class="avoid-tag">Reduce weights by 10-15% · ${pd.avoid[1]}</div>`:''}
      ${pd.do.map(d=>`<div class="phase-item"><div class="pi"></div><div class="pt">${d.name}<span>${d.desc}</span></div></div>`).join('')}

    <div class="phase-section">

function renderPartner(){
  const u=State.currentUser;
  const pd=State.partnerData||{};
  const sharer=pd.asSharer||null;
  const incoming=(pd.asRecipient||[]).filter(l=>l.status==='pending');
  const ps=State.partnerCycleStatus;

  let html=`<div class="page fade-in">
    <button class="auth-back" onclick="goto('profile')">← Profile</button>
    <h1 class="display page-title" style="color:var(--cycle-pink)">PARTNER<br>SHARING</h1>
    <p class="page-sub">Privacy-first: only a predicted period date and current phase name are ever shared with your partner — never your cycle history, length, or symptoms. Off by default, and either of you can unlink anytime.</p>`;

  incoming.forEach(l=>{
    html+=`<div class="progress-block">
      <div style="font-size:14px;line-height:1.5;margin-bottom:14px"><strong>${l.userId?.name||'Someone'}</strong> (${l.userId?.email||l.partnerEmail}) wants to share their cycle predictions with you.</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-pink" style="flex:1" onclick="respondPartnerInvite('${l.id}',true)">Accept</button>
        <button class="btn btn-secondary" style="flex:1" onclick="respondPartnerInvite('${l.id}',false)">Decline</button>
      </div>
    </div>`;
  });

  if(u.gender==='female'){
    if(!u.lastPeriod){
      html+=`<div class="progress-block" style="text-align:center">
        <p style="color:var(--muted2);font-size:13px;margin-bottom:14px">Set up your cycle data to invite a partner to follow your predictions.</p>
        <button class="btn btn-pink" onclick="goto('cycle')">Go to Cycle Tracker</button>
      </div>`;
    }else if(!sharer){
      html+=`<div class="progress-block">
        <div class="label">Share Your Cycle Predictions</div>
        <p style="color:var(--muted2);font-size:13px;margin:8px 0 14px">Invite a partner so they know when your period is coming and how you might be feeling. Only your predicted next date and current phase are ever shared — never your full history.</p>
        <div class="form-group"><label class="label">Partner's Email</label><input class="input" type="email" id="partnerEmail" placeholder="partner@example.com"></div>
        <button class="btn btn-pink btn-full" onclick="sendPartnerInvite()">Send Invite</button>
      </div>`;
    }else if(sharer.status==='pending'){
      html+=`<div class="progress-block">
        <div class="label">Invite Sent</div>
        <p style="color:var(--muted2);font-size:13px;margin:8px 0 14px">Waiting for <strong>${sharer.partnerEmail}</strong> to accept.</p>
        <button class="btn btn-secondary btn-full" onclick="unlinkPartner('${sharer.id}')">Cancel Invite</button>
      </div>`;
    }else if(sharer.status==='accepted'){
      html+=`<div class="progress-block">
        <div class="label">Connected</div>
        <p style="color:var(--muted2);font-size:13px;margin:8px 0 14px">Sharing with <strong>${sharer.partnerId?.name||sharer.partnerEmail}</strong> (${sharer.partnerEmail}).</p>
        <div class="profile-row" onclick="togglePartnerSharing()" style="background:var(--card2);border-radius:10px;padding:14px;cursor:pointer">
          <div class="l">Share my cycle predictions</div>
          <div class="v" style="color:${sharer.sharingEnabled?'var(--green)':'var(--muted)'}">${sharer.sharingEnabled?'ON':'OFF'}</div>
        </div>
        ${!sharer.sharingEnabled?`<p style="color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;margin:10px 0">Sharing is off — your partner can no longer see any prediction, and the last one was deleted from the server.</p>`:''}
        <button class="btn btn-secondary btn-full" style="margin-top:12px" onclick="unlinkPartner('${sharer.id}')">Unlink Partner</button>
      </div>`;
    }
  }

  if(ps?.linked){
    const days=Math.ceil((new Date(ps.nextPeriodDate)-new Date())/86400000);
    const phaseName=PHASE_DATA[ps.currentPhase]?.name||ps.currentPhase;
    const dateStr=ps.nextPeriodDate?new Date(ps.nextPeriodDate).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'—';
    const updatedStr=ps.updatedAt?new Date(ps.updatedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'—';
    html+=`<div class="cycle-home-card ${ps.currentPhase}" style="cursor:default">
      <div class="label">${(ps.partnerName||'Partner')}'s Cycle</div>
      <div style="font-size:20px;font-weight:800;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;margin:6px 0 4px">${phaseName}</div>
      <div style="font-size:13px;color:var(--muted2);margin-bottom:10px">Next period in ~${days>0?days:0} day${days===1?'':'s'} (${dateStr})</div>
      <div style="font-size:13px;line-height:1.6">${PARTNER_TIPS[ps.currentPhase]||''}</div>
      <div style="margin-top:10px;font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px">Updated ${updatedStr}</div>
    </div>`;
  }

  if(!incoming.length&&!ps?.linked&&u.gender!=='female'){
    html+=`<div class="progress-block" style="text-align:center;color:var(--muted);font-size:13px">No partner connections yet. Ask your partner to send an invite from their Cycle page.</div>`;
  }

  html+=`</div>`;
  return html;
}

function renderProgress(){
  const u=State.currentUser;
  const logs=u.weightLogs||[];
  const startWeight=u.startWeight||u.weight;
  const currentWeight=logs.length?logs[logs.length-1].weight:u.weight;
  const targetWeight=u.target||(u.weight-10);
  const lost=(startWeight-currentWeight).toFixed(1);
  const toGo=(currentWeight-targetWeight).toFixed(1);
  const pct=Math.max(0,Math.min(100,((startWeight-currentWeight)/(startWeight-targetWeight))*100)).toFixed(0);

  function buildChart(logs,start,target){
    if(logs.length<2)return`<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">Log at least 2 weights to see your chart</div>`;
    const weights=logs.map(l=>l.weight);
    const min=Math.min(...weights,target)-1,max=Math.max(...weights,start)+1,range=max-min;
    const W=320,H=150,P=28;
    const pts=logs.map((l,i)=>[P+(i/Math.max(1,logs.length-1))*(W-2*P),P+((max-l.weight)/range)*(H-2*P)]);
    const d=pts.map((p,i)=>(i===0?`M${p[0]} ${p[1]}`:`L${p[0]} ${p[1]}`)).join(' ');
    const tY=P+((max-target)/range)*(H-2*P);
    return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:150px">
      <line x1="${P}" y1="${tY}" x2="${W-P}" y2="${tY}" stroke="var(--green)" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
      <text x="${W-P}" y="${tY-5}" text-anchor="end" font-family="JetBrains Mono" font-size="9" fill="var(--green)">target ${target}kg</text>
      <path d="${d}" fill="none" stroke="var(--push)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="var(--push)"/>`).join('')}
    </svg>`;
  }

  return`<div class="page fade-in">
    <h1 class="display page-title">PROGRESS</h1>
    <p class="page-sub">Cut to ${targetWeight}kg</p>
    <div class="stat-row-3">
      <div class="stat-block"><div class="v">${lost}kg</div><div class="l">Lost</div></div>
      <div class="stat-block"><div class="v">${currentWeight}kg</div><div class="l">Current</div></div>
      <div class="stat-block"><div class="v">${toGo}kg</div><div class="l">To Go</div></div>
    </div>
    <div class="progress-block">
      <div class="progress-row"><div class="progress-name">Goal Progress</div><div class="progress-num" style="color:var(--green)">${pct}%</div></div>
      <div class="progress-track"><div class="progress-fill green" style="width:${pct}%"></div></div>
    </div>
    <div style="background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;margin-bottom:12px">Weight Chart</div>
      ${buildChart(logs,startWeight,targetWeight)}
    </div>
    <button class="btn btn-primary btn-full" onclick="openWeightModal()">+ Log Today's Weight</button>
    ${u.isPremium?(()=>{const bm=u.bodyMeasurements||[];const latest=bm.length?bm[bm.length-1]:null;return`<div class="body-meas-section"><h4>Body Measurements</h4>${latest?`<div class="meas-grid"><div class="stat-block"><div class="v">${latest.chest||'—'}</div><div class="l">Chest cm</div></div><div class="stat-block"><div class="v">${latest.waist||'—'}</div><div class="l">Waist cm</div></div><div class="stat-block"><div class="v">${latest.hips||'—'}</div><div class="l">Hips cm</div></div><div class="stat-block"><div class="v">${latest.arms||'—'}</div><div class="l">Arms cm</div></div><div class="stat-block"><div class="v">${latest.bodyFat||'—'}</div><div class="l">Body Fat %</div></div><div class="stat-block"><div class="v">${new Date(latest.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div><div class="l">Logged</div></div></div>`:`<p style="color:var(--muted);font-size:13px;margin-bottom:12px">No measurements yet. Start tracking!</p>`}<button class="btn btn-secondary btn-full" onclick="openBodyMeasModal()">+ Log Body Measurements</button></div>`;})():`<div class="premium-banner" style="margin-top:20px" onclick="goto('premium')"><h4>Body Measurements + PDF Reports</h4><p>Track waist, arms, body fat % and export progress — ₹500/mo</p></div>`}
  </div>`;
}

function getTimeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return 'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

window.onboardNext=async()=>{
  const step=State.onboardingStep;
  const d=State.onboardingData;
  const isFemale=d.gender==='female';
  const totalSteps=isFemale?9:8;

  if(step===0&&!d.gender)return showToast('Please select an option','error');
  if(step===1){const state=document.getElementById('state').value;if(!state)return showToast('Please select your state','error');d.state=state;d.city=STATE_TO_CITY[state]||'Hyderabad';}
  if(step===2&&!d.diet)return showToast('Please select your diet','error');
  if(step===3){const w=+document.getElementById('weight').value,h=+document.getElementById('height').value,a=+document.getElementById('age').value;if(!w||!h||!a)return showToast('Please fill all stats','error');d.weight=w;d.height=h;d.age=a;}
  if(step===4){
    const t=+document.getElementById('target').value;if(!t)return showToast('Please enter target weight','error');if(t>=d.weight)return showToast('Target must be lower than current weight','error');d.target=t;
    const bf=+document.getElementById('targetBodyFat').value;d.targetBodyFat=bf>0?bf:null;
  }
  if(step===5&&!d.activity)return showToast('Please select activity level','error');
  if(step===6){
    if(!d.equipmentAccess)return showToast('Please select where you train','error');
    if(!d.workoutDaysPerWeek)return showToast('Please select how many days a week you train','error');
  }
  if(step===7&&!d.foods?.length)return showToast('Please select at least one food','error');
  if(step===8&&isFemale){
    const lp=document.getElementById('lastPeriod').value;
    const cl=+document.getElementById('cycleLength').value||28;
    if(!lp)return showToast('Please enter last period date','error');
    d.lastPeriod=lp;d.cycleLength=cl;
  }

  if(step<totalSteps-1){State.onboardingStep++;render();return;}

  const macros=calcMacros(d.weight,d.height,d.age,d.activity,d.gender||'male');
  State.currentUser={...State.currentUser,city:d.city,state:d.state,diet:d.diet,gender:d.gender,weight:d.weight,startWeight:d.weight,height:d.height,age:d.age,target:d.target,targetBodyFat:d.targetBodyFat||null,activity:d.activity,equipmentAccess:d.equipmentAccess,workoutDaysPerWeek:d.workoutDaysPerWeek,foods:d.foods,macros,onboarded:true,weightLogs:[{weight:d.weight,date:new Date().toISOString()}],lastPeriod:d.lastPeriod||null,cycleLength:d.cycleLength||28};
  await saveData('user_'+State.currentUser.email,State.currentUser);
  // Sync profile to backend (non-blocking, best-effort)
  const _u=State.currentUser;
  apiCall('PUT','/users/me',{name:_u.name,age:_u.age,weight:_u.weight,height:_u.height,city:_u.city,state:_u.state,workType:_u.activity,habits:_u.foods||[],gender:_u.gender,targetBodyFat:_u.targetBodyFat,equipmentAccess:_u.equipmentAccess,workoutDaysPerWeek:_u.workoutDaysPerWeek,fitnessGoal:'weight_loss'});
  showToast('Welcome to FitForge.');
  goto('home');
};

window.startPremiumCheckout=async(amt)=>{

        name:'FitForge',description:order.description,
        prefill:{name:order.userName,email:order.userEmail},
        theme:{color:'#fbbf24'},
        handler:async(resp)=>{

            razorpayOrderId:resp.razorpay_order_id,
            razorpayPaymentId:resp.razorpay_payment_id,
            razorpaySignature:resp.razorpay_signature

      rzp.open();
      return;
    }
  }
  openRazorpay(amt);
};
